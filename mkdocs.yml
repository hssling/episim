site_name: EPISIM
site_url: https://hssling.github.io/episim
repo_url: https://github.com/hssling/episim
theme:
  name: readthedocs
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Lab surface: lab.md
  - Deployment: deployment.md
  - API:
    - Core: api/core.md
    - Designs: api/designs.md
    - Research: api/research.md
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
