name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          pip install -e ".[dev,docs]"
      - name: Lint
        run: |
          ruff check episim tests
      - name: Type check
        run: |
          mypy episim
      - name: Tests + coverage gate
        run: |
          pytest --cov=episim --cov-report=term-missing --cov-fail-under=90
      - name: Notebook smoke
        run: |
          pytest --nbmake notebooks/
